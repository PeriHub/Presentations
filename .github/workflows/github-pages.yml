name: GitHub Pages
on:
  push:
    branches:
      - master
    paths:
      - "**.md"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        folder:
          - COMPLAS_2025
          - Antrittsvorlesung
          - GAMM_2024
          - GAMM_2026
          - USACM_2024
          - PDDAY_2024
          - PDDAY_2025
          - MICRO_ANALYSIS
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: Build HTML
        run: |
          FOLDER="${{ matrix.folder }}"
          mkdir -p "public/${FOLDER}"
          if [ -d "${FOLDER}/assets" ]; then
            cp -r "${FOLDER}/assets" "public/${FOLDER}/"
          fi
          npx @marp-team/marp-cli@latest "${FOLDER}/index.md" \
            --theme-set themes/ \
            --html \
            --allow-local-files \
            -o "public/${FOLDER}/index.html"
        timeout-minutes: 2
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: public
          name: ${{ matrix.folder }}
          retention-days: 1
  deploy:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: public
          merge-multiple: true
      - name: Copy global assets and index.html
        run: |
          if [ -d "assets" ]; then
            cp -r assets public/assets
          fi
          if [ -d "themes" ]; then
            cp -r themes public/themes
          fi
          cp index.html public/index.html
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
